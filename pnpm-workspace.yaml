packages:
  - packages/*
allowBuilds:
  esbuild: true

catalogs:
  dev:
    '@builder.io/qwik': ^1.19.2
    '@vite-pwa/vitepress': ^1.1.0
    'bumpp': '^11.1.0'
    es-toolkit: ^1.46.1
    jiti: ^2.7.0
    oxc-minify: ^0.125.0
    pathe: ^2.0.3
    taze: ^19.12.0
    tinyglobby: ^0.2.16
    vite: npm:@voidzero-dev/vite-plus-core@latest
    vite-plus: ^0.1.21
    vitepress: 2.0.0-alpha.17
    vitest: npm:@voidzero-dev/vite-plus-test@latest
    vue: ^3.5.34
    '@shikijs/vitepress-twoslash': ^4.0.2
    gsap: ^3.15.0
  lint:
    oxlint-plugin-qwik: ^0.0.8
  types:
    '@types/node': ^24.12.4
    typescript: ^5.9.3

overrides:
  vite: 'catalog:dev'
  vitest: 'catalog:dev'

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: '*'
    vitest: '*'

shellEmulator: true
