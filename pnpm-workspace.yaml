packages:
  - packages/*

shellEmulator: true

allowBuilds:
  esbuild: true

catalogs:
  dev:
    '@builder.io/qwik': ^1.19.2
    es-toolkit: ^1.46.1
    oxc-minify: ^0.130.0
    pathe: ^2.0.3
    tinyglobby: ^0.2.16
    vitest: npm:@voidzero-dev/vite-plus-test@latest
    vue: ^3.5.34
    '@shikijs/vitepress-twoslash': ^4.0.2
    gsap: ^3.15.0
  build:
    vite: npm:@voidzero-dev/vite-plus-core@latest
    vite-plus: ^0.1.21
    vitepress: 2.0.0-alpha.17
  lint:
    oxlint-plugin-qwik: ^0.0.8
  types:
    '@types/node': ^24.12.4
    typescript: ^5.9.3
  scripts:
    bumpp: ^11.1.0
    jiti: ^2.7.0
    taze: ^19.12.0

overrides:
  vite: 'catalog:build'
  vitest: 'catalog:dev'

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: '*'
    vitest: '*'
